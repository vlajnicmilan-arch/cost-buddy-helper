name: Generate Keystore (one-time)

# Pokreni ručno iz GitHub UI: Actions → Generate Keystore → Run workflow
# Nakon što kopiraš Base64 + lozinku u Secrets, OBRIŠI ovaj workflow file.

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Lozinka za keystore (zapamti je! ide u ANDROID_KEYSTORE_PASSWORD secret)'
        required: true
        type: string
      key_alias:
        description: 'Alias ključa (preporuka: vmbalance)'
        required: true
        default: 'vmbalance'
        type: string
      common_name:
        description: 'Ime (CN) - npr. V&M Balance'
        required: true
        default: 'V&M Balance'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore vmbalance-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "${{ github.event.inputs.key_alias }}" \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.keystore_password }}" \
            -dname "CN=${{ github.event.inputs.common_name }}, OU=Mobile, O=V&M Balance, L=Zagreb, ST=Zagreb, C=HR"

      - name: Convert to Base64 and print
        run: |
          echo ""
          echo "=========================================="
          echo "KOPIRAJ SVE IZMEĐU LINIJA ISPOD U SECRET:"
          echo "ANDROID_KEYSTORE_BASE64"
          echo "=========================================="
          echo "----------BEGIN BASE64----------"
          base64 -w 0 vmbalance-release.jks
          echo ""
          echo "-----------END BASE64-----------"
          echo "=========================================="
          echo ""
          echo "DRUGI SECRETI KOJE TREBAŠ DODATI:"
          echo "  ANDROID_KEYSTORE_PASSWORD = (lozinka koju si upisao)"
          echo "  ANDROID_KEY_ALIAS         = ${{ github.event.inputs.key_alias }}"
          echo "  ANDROID_KEY_PASSWORD      = (ista lozinka)"
          echo "=========================================="

      - name: Upload keystore as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup-DOWNLOAD-AND-SAVE
          path: vmbalance-release.jks
          retention-days: 7
