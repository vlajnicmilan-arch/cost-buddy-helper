name: stress-smoke

# Manual trigger from GitHub UI.
# Supports Faza 1 (`--smoke`) and Faza 2 Layer 2 concurrency (`--layer=2`).
# No cron, no schedule, no --full, no Faze 3/4/5.

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Stress harness layer to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - layer2

concurrency:
  group: stress-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: stress harness — ${{ github.event.inputs.layer || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest already has Docker + docker compose preinstalled.
      # We only need Supabase CLI and Bun on top.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sanity — required tools present
        run: |
          set -euo pipefail
          docker --version
          supabase --version
          bun --version
          bash --version | head -1

      # `supabase start` applies the app migration chain on a fresh local DB.
      # pg_cron/pg_net therefore must be bootstrapped before that first replay,
      # not later inside run-all.sh. This helper starts with local migration
      # replay temporarily disabled, installs the extensions, restores config,
      # then applies the full migration chain normally.
      - name: Start Supabase with cron extension bootstrap
        run: bash stress/bin/bootstrap-local-db.sh start

      - name: Write stress/.env from `supabase status`
        run: |
          set -euo pipefail
          eval "$(supabase status --output env)"
          : "${API_URL:?supabase status did not expose API_URL}"
          : "${ANON_KEY:?supabase status did not expose ANON_KEY}"
          : "${SERVICE_ROLE_KEY:?supabase status did not expose SERVICE_ROLE_KEY}"
          : "${DB_URL:?supabase status did not expose DB_URL}"
          cat > stress/.env <<EOF
          STRESS_SUPABASE_URL=${API_URL}
          STRESS_SUPABASE_DB_URL=${DB_URL}
          STRESS_SUPABASE_ANON_KEY=${ANON_KEY}
          STRESS_SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          STRESS_AUTH_MODE=login
          STRESS_SEED_PASSWORD=stress-test-pw-local-only
          STRESS_SEED_MODE=smoke
          EOF
          echo "stress/.env written ($(wc -l < stress/.env) lines)"

      - name: Run smoke harness
        run: bash stress/bin/run-all.sh --smoke

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-reports
          path: stress/reports/
          if-no-files-found: warn
          retention-days: 7
