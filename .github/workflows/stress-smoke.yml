name: stress-smoke

# Manual trigger from GitHub UI.
# Supports Faza 1 (`--smoke`), Faza 2 Layer 2 concurrency (`--layer=2`),
# Faza 2 Layer 1 load (`--layer=1`, k6 mixed_load), and
# Faza 2 Layer 3 E2E-under-load (`--layer=3`, Playwright + k6 small background).
# No cron, no schedule, no --full, no Faze 3/4/5.

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Stress harness layer to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - layer1
          - layer2
          - layer3
      profile:
        description: 'Layer 1 profile (ignored for smoke/layer2)'
        required: false
        default: 'small'
        type: choice
        options:
          - small
          - mid
          - full

concurrency:
  group: stress-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: stress harness — ${{ github.event.inputs.layer || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest already has Docker + docker compose preinstalled.
      # We only need Supabase CLI, Bun, and k6 (layer1) on top.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install k6 (layer1 + layer3)
        if: ${{ github.event.inputs.layer == 'layer1' || github.event.inputs.layer == 'layer3' }}
        run: |
          set -euo pipefail
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Sanity — required tools present
        run: |
          set -euo pipefail
          docker --version
          supabase --version
          bun --version
          bash --version | head -1

      # `supabase start` applies the app migration chain on a fresh local DB.
      # pg_cron/pg_net therefore must be bootstrapped before that first replay,
      # not later inside run-all.sh. This helper starts with local migration
      # replay temporarily disabled, installs the extensions, restores config,
      # then applies the full migration chain normally.
      - name: Start Supabase with cron extension bootstrap
        run: bash stress/bin/bootstrap-local-db.sh start

      - name: Write stress/.env from `supabase status`
        run: |
          set -euo pipefail
          eval "$(supabase status --output env)"
          : "${API_URL:?supabase status did not expose API_URL}"
          : "${ANON_KEY:?supabase status did not expose ANON_KEY}"
          : "${SERVICE_ROLE_KEY:?supabase status did not expose SERVICE_ROLE_KEY}"
          : "${DB_URL:?supabase status did not expose DB_URL}"
          cat > stress/.env <<EOF
          STRESS_SUPABASE_URL=${API_URL}
          STRESS_SUPABASE_DB_URL=${DB_URL}
          STRESS_SUPABASE_ANON_KEY=${ANON_KEY}
          STRESS_SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          STRESS_AUTH_MODE=login
          STRESS_SEED_PASSWORD=stress-test-pw-local-only
          STRESS_SEED_MODE=smoke
          EOF
          echo "stress/.env written ($(wc -l < stress/.env) lines)"

      - name: Run stress harness
        env:
          PROFILE: ${{ github.event.inputs.profile || 'small' }}
        run: |
          layer="${{ github.event.inputs.layer || 'smoke' }}"
          if [[ "$layer" == "layer2" ]]; then
            bash stress/bin/run-all.sh --layer=2
          elif [[ "$layer" == "layer1" ]]; then
            bash stress/bin/run-all.sh --layer=1
          else
            bash stress/bin/run-all.sh --smoke
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-reports
          path: stress/reports/
          if-no-files-found: warn
          retention-days: 7



