name: Android Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, upload & publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # potreban je puni token kako bismo mogli commitati version.json natrag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build web (Vite)
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/vmbalance-release.jks
          ls -la $RUNNER_TEMP/vmbalance-release.jks

      - name: Gradle assembleRelease (signed)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/vmbalance-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Read version from version.json
        id: ver
        run: |
          VERSION=$(node -p "require('./public/version.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected app version: $VERSION"

      - name: Rename APK with version
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/release/app-release.apk \
             dist-apk/vmbalance-${{ steps.ver.outputs.version }}.apk

      - name: Upload APK artifact (GitHub fallback)
        uses: actions/upload-artifact@v4
        with:
          name: vmbalance-release-apk
          path: dist-apk/*.apk
          retention-days: 30

      - name: Upload APK via signed URL (Lovable Cloud)
        env:
          APK_UPLOAD_TOKEN: ${{ secrets.APK_UPLOAD_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APK_PATH="dist-apk/vmbalance-${VERSION}.apk"
          FN_URL="https://fzalxjretvtvokiotvkf.supabase.co/functions/v1/upload-apk-release"

          echo "Step 1/2: requesting signed upload URL for v${VERSION}"
          HTTP_CODE=$(curl -sS -o /tmp/sign_resp.json -w "%{http_code}" \
            -X POST "$FN_URL" \
            -H "x-upload-token: ${APK_UPLOAD_TOKEN}" \
            -H "x-apk-version: ${VERSION}")

          echo "HTTP $HTTP_CODE"
          cat /tmp/sign_resp.json || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to get signed URL"
            exit 1
          fi

          SIGNED_URL=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/sign_resp.json','utf8')).signedUrl")
          if [ -z "$SIGNED_URL" ] || [ "$SIGNED_URL" = "undefined" ]; then
            echo "❌ signedUrl missing in response"
            exit 1
          fi

          echo "Step 2/2: PUT APK directly to Storage"
          UP_CODE=$(curl -sS -o /tmp/put_resp.txt -w "%{http_code}" \
            -X PUT "$SIGNED_URL" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK_PATH}")

          echo "HTTP $UP_CODE"
          cat /tmp/put_resp.txt || true
          if [ "$UP_CODE" != "200" ] && [ "$UP_CODE" != "201" ]; then
            echo "❌ APK PUT failed"
            exit 1
          fi
          echo "✅ APK uploaded via signed URL"

      - name: Update version.json with SHA-256 + apkUrl
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APK_PATH="dist-apk/vmbalance-${VERSION}.apk"
          SHA256=$(sha256sum "$APK_PATH" | awk '{print $1}')
          PUBLIC_URL="https://fzalxjretvtvokiotvkf.supabase.co/storage/v1/object/public/public-assets/releases/vmbalance-${VERSION}.apk"

          node -e "
            const fs = require('fs');
            const path = 'public/version.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            m.version = '${VERSION}';
            m.sha256 = '${SHA256}';
            m.apkUrl = '${PUBLIC_URL}';
            m.minSupportedVersion = m.minSupportedVersion || '0.0.0';
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
            console.log('Updated version.json:', m);
          "

      - name: Commit updated version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/version.json; then
            echo "No changes to version.json — skipping commit"
            exit 0
          fi
          git add public/version.json
          git commit -m "chore(release): publish APK v${{ steps.ver.outputs.version }} [skip ci]"
          git push
