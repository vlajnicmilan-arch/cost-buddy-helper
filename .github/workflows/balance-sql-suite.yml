name: Balance SQL Regression Suite

# Deploy gate for the balance engine. See mem://features/balance-regression-testing-policy.
# Runs the authoritative SQL harness against a real Postgres 16 loaded with a
# curated balance baseline + the balance-relevant migrations listed in
# supabase/tests/balance/BALANCE_MIGRATIONS.txt.
#
# Why curated baseline (not "apply all migrations"):
# see .lovable/plan.md — "Redizajn balance-sql-suite.yml". Full migration
# history is not linearly replayable on plain postgres:16 (missing Supabase
# extensions + inter-migration conflicts). The gate protects balance
# semantics, so we test balance semantics — nothing more.

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'src/lib/balance/**'
      - '.github/workflows/balance-sql-suite.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'src/lib/balance/**'
      - '.github/workflows/balance-sql-suite.yml'

jobs:
  balance-sql:
    name: Balance SQL suite (postgres:16, curated baseline)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: balance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: balance_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/balance_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # drift-check needs history to diff vs base ref

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          exit 1

      - name: Detect balance-relevant migration drift
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref && format('origin/{0}', github.event.pull_request.base.ref) || 'origin/main' }}
        run: bash supabase/tests/balance/detect-drift.sh

      - name: Bootstrap Supabase-compatible schema stubs
        run: psql -v ON_ERROR_STOP=1 -f supabase/tests/balance/bootstrap.sql

      - name: Apply curated balance baseline
        run: psql -v ON_ERROR_STOP=1 -f supabase/tests/balance/baseline.sql

      - name: Apply balance-relevant migrations in order
        run: |
          set -euo pipefail
          # Read whitelist, strip trailing `# comments`, skip blank lines.
          patterns=$(sed -E 's/[[:space:]]*#.*$//' supabase/tests/balance/BALANCE_MIGRATIONS.txt | awk 'NF')
          if [ -z "$patterns" ]; then
            echo "BALANCE_MIGRATIONS.txt is empty — refusing to run suite" >&2
            exit 1
          fi
          # Expand each pattern to concrete files, then sort chronologically.
          files=""
          while IFS= read -r pat; do
            for f in supabase/migrations/$pat; do
              if [ ! -f "$f" ]; then
                echo "Whitelist pattern '$pat' did not match any migration" >&2
                exit 1
              fi
              files="$files"$'\n'"$f"
            done
          done <<< "$patterns"
          echo "$files" | awk 'NF' | sort | while IFS= read -r f; do
            echo "==> Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run balance regression suite (setup + scenarios in one session)
        run: |
          set -euo pipefail
          # 00_setup.sql opens BEGIN + SAVEPOINT before_scenarios; 10_scenarios.sql
          # relies on both. They MUST run in the same psql session — piping both
          # into one invocation preserves transaction state.
          cat supabase/tests/balance/00_setup.sql supabase/tests/balance/10_scenarios.sql \
            | psql -v ON_ERROR_STOP=1 2>&1 | tee /tmp/suite.out
          if grep -E '^(psql:.*ERROR|FAIL )' /tmp/suite.out; then
            echo "Balance SQL suite reported failures" >&2
            exit 1
          fi
          echo "Balance SQL suite: $(grep -c 'PASS ' /tmp/suite.out) assertions PASS"

