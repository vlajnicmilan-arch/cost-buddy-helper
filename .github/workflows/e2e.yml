name: E2E

# DEFERRED: Infrastructure is in place but disabled until E2E secrets are configured.
# To activate: add E2E_SUPABASE_URL, E2E_SUPABASE_ANON_KEY, E2E_SUPABASE_SERVICE_ROLE_KEY,
# E2E_USER_PASSWORD to GitHub repo secrets, then change `on:` triggers back to pull_request/push.
# See docs/E2E_TESTING.md.

on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true


jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 'true'
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_PORT: '4173'
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run E2E
        run: bunx playwright test --project=chromium-mobile
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
