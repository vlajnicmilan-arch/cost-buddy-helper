# AUXILIARY ARTIFACT — NOT USED BY run-all.sh.
#
# Faza 1 zahtijeva puni lokalni Supabase stack (Postgres + GoTrue +
# PostgREST) preko `supabase start`. Ovaj compose diže SAMO Postgres i
# NIJE valjan fallback — bez GoTrue-a auth pool ne može raditi.
#
# Zadržan je kao pomoćni artefakt za budući DB-only mikro-benchmark ili
# eksperimente van glavnog harnessa. Ako ga koristiš izvan tog konteksta,
# svjestan si da ne validiraš produkcijski oblik stacka.
#
# Port 55433 kako se ne bi sudarao s `supabase start` (54322).
version: "3.8"
services:
  stress-postgres:
    image: postgres:16
    profiles: ["stress"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "55433:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=postgres
      -c max_connections=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
