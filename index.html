    <!-- Preload LCP hero image with responsive sources so the browser starts
         downloading it BEFORE the JS bundle parses. This is the single biggest
         LCP win on /. Mobile gets a 16KB variant, desktop the full 41KB. -->
    <link
      rel="preload"
      as="image"
      href="/hero-receipt-scan-mobile.webp"
      imagesrcset="/hero-receipt-scan-mobile.webp 640w, /hero-receipt-scan.webp 1024w"
      imagesizes="(max-width: 1023px) 100vw, 50vw"
      fetchpriority="high"
    />

    <meta name="mobile-web-app-capable" content="yes" />
    <title>V&M Balance - Upravljaj svojim financijama</title>
    <meta name="description" content="V&M Balance je pametna aplikacija za praćenje troškova, budžetiranje i upravljanje osobnim i poslovnim financijama. Besplatno za početi!" />
    <meta name="author" content="V&M Balance" />
    <meta name="keywords" content="praćenje troškova, budžet, financije, upravljanje novcem, osobne financije, poslovne financije, expense tracker" />
    <meta name="robots" content="index, follow" />

    <meta property="og:title" content="V&M Balance - Pametno upravljanje financijama" />
    <meta property="og:description" content="Pametna aplikacija za praćenje troškova, budžetiranje i upravljanje osobnim i poslovnim financijama." />

    <meta property="og:site_name" content="V&M Balance" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@VMBalance" />
    <meta name="twitter:title" content="V&M Balance - Pametno upravljanje financijama" />
    <meta name="twitter:description" content="Pametna aplikacija za praćenje troškova i upravljanje financijama." />
    <meta name="twitter:image" content="https://vmbalance.com/logo-512.png" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "V&M Balance",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web, Android, iOS",
      "description": "Pametna aplikacija za praćenje troškova, budžetiranje i upravljanje osobnim i poslovnim financijama.",
      "url": "https://cost-buddy-helper.lovable.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
      }
    }
    </script>
  </head>

  <body>
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script>
      // Kill any lingering Service Worker + cached PWA bundle.
      // This is critical for the Capacitor APK that loads vmbalance.com:
      // older PWA installs registered a SW that intercepts /setup and serves
      // a stale JS bundle, which makes buttons appear unresponsive.
      (function () {
        try {
          var ua = (navigator.userAgent || '').toLowerCase();
          var isCapacitor = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
          var isAndroidWebView = /\bwv\b/.test(ua) || /; wv\)/.test(ua);
          var isProdHost = location.hostname === 'vmbalance.com' || location.hostname === 'www.vmbalance.com';
          var shouldKillSW = isCapacitor || isAndroidWebView || isProdHost;
          if (shouldKillSW && 'serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { try { r.unregister(); } catch (e) {} });
            }).catch(function () {});
          }
          if (shouldKillSW && window.caches && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { try { caches.delete(k); } catch (e) {} });
            }).catch(function () {});
          }
        } catch (e) { /* no-op */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
